<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>習慣チェック | CARISENSE</title>
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a24;
    --surface2: #22222e;
    --border: #2e2e3e;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --green: #4ade80;
    --yellow: #fbbf24;
    --text: #e8e8f0;
    --text-muted: #7070a0;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
    min-height: 100vh;
    padding: 16px;
  }

  /* ─── Loading ─── */
  .loading-overlay {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 200;
    flex-direction: column; gap: 12px;
    transition: opacity .3s;
  }
  .loading-overlay.hidden { opacity: 0; pointer-events: none; }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-overlay span { color: var(--text-muted); font-size: .8rem; }

  /* ─── Sync badge ─── */
  .sync-badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: .6rem; color: var(--green);
    background: rgba(74,222,128,.1);
    border: 1px solid rgba(74,222,128,.25);
    border-radius: 6px; padding: 2px 6px;
    margin-left: 6px; vertical-align: middle;
  }
  .sync-badge.syncing { color: var(--yellow); background: rgba(251,191,36,.1); border-color: rgba(251,191,36,.25); }

  /* ─── Header ─── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .header h1 {
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: .03em;
    color: var(--text);
  }
  .header .brand {
    font-size: .65rem;
    color: var(--accent);
    letter-spacing: .15em;
    font-weight: 600;
    text-transform: uppercase;
  }
  .week-nav {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .week-nav button {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    width: 30px; height: 30px;
    border-radius: 8px;
    cursor: pointer;
    font-size: .9rem;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s;
  }
  .week-nav button:hover { background: var(--border); }
  .week-label {
    font-size: .75rem;
    color: var(--text-muted);
    white-space: nowrap;
  }

  /* ─── Summary Cards ─── */
  .summary {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    text-align: center;
  }
  .card .val {
    font-size: 1.5rem;
    font-weight: 700;
    line-height: 1;
  }
  .card .lbl {
    font-size: .65rem;
    color: var(--text-muted);
    margin-top: 4px;
    letter-spacing: .04em;
  }
  .val.green { color: var(--green); }
  .val.yellow { color: var(--yellow); }
  .val.purple { color: var(--accent); }

  /* ─── Table ─── */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 20px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }
  th, td {
    border-bottom: 1px solid var(--border);
    text-align: center;
    vertical-align: middle;
  }
  th {
    background: var(--surface2);
    font-size: .65rem;
    font-weight: 600;
    letter-spacing: .06em;
    color: var(--text-muted);
    padding: 8px 2px;
  }
  th.today-col { color: var(--accent); }
  td.habit-name {
    text-align: left;
    padding: 8px 8px;
    font-size: .68rem;
    font-weight: 500;
    color: var(--text);
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
  }
  td.day-cell {
    padding: 6px 2px;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  @media (hover: hover) {
    td.day-cell:hover .cell-inner { background: var(--border); }
  }
  td.today-col { background: rgba(108,99,255,.06); }
  tr:last-child td { border-bottom: none; }

  .cell-inner {
    width: 24px; height: 24px;
    border-radius: 8px;
    margin: 0 auto;
    display: flex; align-items: center; justify-content: center;
    font-size: .85rem;
    transition: background .1s, transform .1s;
    border: 1.5px solid transparent;
  }
  .cell-inner.checked {
    background: rgba(74,222,128,.15);
    border-color: var(--green);
    color: var(--green);
  }
  .cell-inner.checked:active { transform: scale(.85); }
  .cell-inner.unchecked {
    background: var(--surface2);
    border-color: var(--border);
    color: transparent;
  }
  .cell-inner.future {
    background: transparent;
    border-color: rgba(46,46,62,.5);
    opacity: .4;
    cursor: default;
  }
  .cell-inner.weekly-checked {
    background: rgba(251,191,36,.12);
    border-color: var(--yellow);
    color: var(--yellow);
  }

  /* streak badge */
  .streak-badge {
    display: inline-block;
    font-size: .6rem;
    background: rgba(251,191,36,.15);
    color: var(--yellow);
    border-radius: 4px;
    padding: 1px 4px;
    margin-left: 4px;
    vertical-align: middle;
  }

  /* ─── Row actions ─── */
  .habit-cell-wrap { display: flex; align-items: center; gap: 0; width: 100%; }
  .habit-text { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .row-actions {
    opacity: 1;
    display: flex; gap: 2px;
  }
  @media (hover: hover) {
    .row-actions { opacity: 0; transition: opacity .15s; }
    tr:hover .row-actions { opacity: 1; }
  }
  .row-actions button {
    background: none; border: none; cursor: pointer;
    color: var(--text-muted); font-size: .75rem;
    width: 22px; height: 22px; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
  }
  .row-actions button:hover { background: var(--border); color: var(--text); }
  .btn-star {
    background: none; border: none; cursor: pointer;
    color: var(--border);
    font-size: .85rem;
    width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    padding: 0;
  }
  .btn-star.active { color: #facc15; }

  /* ─── Important habit ─── */
  tr.important-row td.habit-name {
    border-left: 3px solid #facc15;
    background: rgba(250,204,21,.06);
  }
  tr.important-row td:not(.habit-name) {
    background: rgba(250,204,21,.04);
  }
  .important-badge {
    display: inline-block;
    font-size: .55rem;
    font-weight: 700;
    background: rgba(250,204,21,.2);
    color: #facc15;
    border: 1px solid rgba(250,204,21,.4);
    border-radius: 4px;
    padding: 1px 4px;
    margin-left: 4px;
    vertical-align: middle;
    letter-spacing: .04em;
  }

  /* ─── Progress bar ─── */
  .progress-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px 10px;
    font-size: .65rem;
    color: var(--text-muted);
  }
  .progress-bar {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--green));
    border-radius: 99px;
    transition: width .4s ease;
  }

  /* ─── Add habit ─── */
  .add-section {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }
  .add-section input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: .85rem;
    outline: none;
    transition: border-color .15s;
  }
  .add-section input:focus { border-color: var(--accent); }
  .add-section input::placeholder { color: var(--text-muted); }
  .add-section select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    padding: 10px 8px;
    font-size: .8rem;
    outline: none;
    cursor: pointer;
  }
  .add-section button {
    background: var(--accent);
    border: none;
    color: white;
    border-radius: 10px;
    padding: 10px 16px;
    font-size: .85rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity .15s;
  }
  .add-section button:hover { opacity: .85; }

  /* ─── Motivation quote ─── */
  .quote-card {
    background: linear-gradient(135deg, rgba(108,99,255,.15), rgba(255,101,132,.1));
    border: 1px solid rgba(108,99,255,.3);
    border-radius: var(--radius);
    padding: 14px 16px;
    font-size: .78rem;
    color: var(--text-muted);
    line-height: 1.5;
    text-align: center;
  }
  .quote-card strong { color: var(--text); display: block; margin-bottom: 4px; font-size: .85rem; }

  /* ─── Edit modal ─── */
  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.6);
    z-index: 100;
    align-items: center; justify-content: center;
    padding: 16px;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    width: 100%; max-width: 360px;
  }
  .modal h3 { font-size: .9rem; margin-bottom: 14px; }
  .modal input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: .85rem;
    outline: none;
    margin-bottom: 10px;
  }
  .modal input:focus { border-color: var(--accent); }
  .modal select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: .85rem;
    outline: none;
    margin-bottom: 14px;
  }
  .modal-actions { display: flex; gap: 8px; }
  .modal-actions button {
    flex: 1; padding: 10px; border-radius: 8px;
    font-size: .85rem; font-weight: 600; cursor: pointer; border: none;
  }
  .btn-save { background: var(--accent); color: white; }
  .btn-cancel { background: var(--surface2); color: var(--text-muted); }
  .btn-delete { background: rgba(255,101,132,.15); color: var(--accent2); }

  /* ─── Responsive ─── */
  @media (min-width: 600px) {
    body { padding: 24px; max-width: 720px; margin: 0 auto; }
    .cell-inner { width: 32px; height: 32px; }
    td.habit-name { font-size: .85rem; padding: 10px 12px; white-space: normal; overflow: visible; }
    .habit-text { white-space: normal; overflow: visible; text-overflow: clip; }
  }
</style>
</head>
<body>

<!-- Loading -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <span>データを読み込み中...</span>
</div>

<div class="header">
  <div>
    <div class="brand">CARISENSE</div>
    <h1 id="pageTitle">習慣チェック<span class="sync-badge" id="syncBadge">● 同期中</span></h1>
  </div>
  <div class="week-nav">
    <button onclick="shiftWeek(-1)">‹</button>
    <span class="week-label" id="weekLabel">—</span>
    <button onclick="shiftWeek(1)">›</button>
  </div>
</div>

<!-- Summary -->
<div class="summary">
  <div class="card">
    <div class="val green" id="sumRate">—</div>
    <div class="lbl">今週達成率</div>
  </div>
  <div class="card">
    <div class="val yellow" id="sumStreak">—</div>
    <div class="lbl">最長連続</div>
  </div>
  <div class="card">
    <div class="val purple" id="sumDone">—</div>
    <div class="lbl">完了チェック</div>
  </div>
</div>

<!-- Table -->
<div class="table-wrap">
  <table id="habitTable">
    <thead id="tableHead"></thead>
    <tbody id="tableBody"></tbody>
  </table>
  <div class="progress-row">
    <span id="progressLabel">0 / 0 完了</span>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <span id="progressPct">0%</span>
  </div>
</div>

<!-- Add habit -->
<div class="add-section">
  <input type="text" id="newHabitInput" placeholder="新しい習慣を追加..." maxlength="30">
  <select id="newHabitFreq">
    <option value="daily">毎日</option>
    <option value="weekly">週1回</option>
  </select>
  <button onclick="addHabit()">＋追加</button>
</div>

<!-- Quote -->
<div class="quote-card" id="quoteCard">
  <strong id="quoteText">読み込み中...</strong>
  <span id="quoteSub"></span>
</div>

<!-- Edit modal -->
<div class="overlay" id="editOverlay">
  <div class="modal">
    <h3>習慣を編集</h3>
    <input type="text" id="editInput" maxlength="30">
    <select id="editFreq">
      <option value="daily">毎日</option>
      <option value="weekly">週1回</option>
    </select>
    <div class="modal-actions">
      <button class="btn-delete" onclick="deleteHabit()">削除</button>
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-save" onclick="saveEdit()">保存</button>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// ─── Firebase ────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyAsC4ag3jEYOgjQFXQnNjMeoD5FzC6ZRI8",
  authDomain: "private-habits.firebaseapp.com",
  databaseURL: "https://private-habits-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "private-habits",
  storageBucket: "private-habits.firebasestorage.app",
  messagingSenderId: "376857650362",
  appId: "1:376857650362:web:74d76e8d9eb27985c84e83"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const ROOT = 'habitData';

// ─── Constants ───────────────────────────────────────────────
const DAY_LABELS = ['月','火','水','木','金','土','日'];
const DEFAULT_HABITS = [
  { id: 'h1', name: '朝8:30までに起床', freq: 'daily' },
  { id: 'h2', name: 'キャリセンスの成功', freq: 'daily' },
  { id: 'h3', name: '月間売上1000万達成', freq: 'daily' },
  { id: 'h4', name: '女遊び', freq: 'weekly' },
];
const QUOTES = [
  { text: '1000万への道は、今日の1チェックから始まる。', sub: '— CARISENSE' },
  { text: '完璧より継続。仮説検証を繰り返せ。', sub: '— CARISENSE' },
  { text: '朝を制する者が、キャリセンスを制する。', sub: '— CARISENSE' },
  { text: '今週も全力で、20代の可能性を拓く。', sub: '— CARISENSE' },
  { text: '小さな習慣の積み上げが、大きな成功をつくる。', sub: '— CARISENSE' },
];

// ─── State ───────────────────────────────────────────────────
let habits = [];
let checks = {};
let weekOffset = 0;
let editingId = null;
let initialized = false;

// ─── Firebase sync ───────────────────────────────────────────
function setSyncBadge(state) {
  const b = document.getElementById('syncBadge');
  if (state === 'ok') {
    b.textContent = '● 同期済み'; b.className = 'sync-badge';
  } else {
    b.textContent = '● 同期中'; b.className = 'sync-badge syncing';
  }
}

// Listen to Firebase (real-time)
db.ref(ROOT).on('value', snap => {
  const data = snap.val() || {};
  habits = data.habits ? Object.values(data.habits).sort((a, b) => (a.order ?? 0) - (b.order ?? 0)) : [];
  checks = data.checks || {};

  if (!initialized) {
    if (habits.length === 0) {
      // First time: write defaults
      saveHabits(DEFAULT_HABITS);
      habits = DEFAULT_HABITS;
    }
    initialized = true;
    document.getElementById('loadingOverlay').classList.add('hidden');
  }

  setSyncBadge('ok');
  renderAll();
});

function saveHabits(h) {
  setSyncBadge('syncing');
  const obj = {};
  h.forEach((x, i) => { obj[x.id] = { ...x, order: i }; });
  db.ref(ROOT + '/habits').set(obj);
}

function saveChecks() {
  setSyncBadge('syncing');
  db.ref(ROOT + '/checks').set(checks);
}

// ─── Week helpers ─────────────────────────────────────────────
function getWeekDates(offset = 0) {
  const today = new Date();
  const dow = (today.getDay() + 6) % 7;
  const mon = new Date(today);
  mon.setDate(today.getDate() - dow + offset * 7);
  return Array.from({length: 7}, (_, i) => {
    const d = new Date(mon);
    d.setDate(mon.getDate() + i);
    return d;
  });
}
function fmt(d) {
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}
function isToday(d) { return fmt(d) === fmt(new Date()); }
function isFuture(d) {
  const today = new Date(); today.setHours(0,0,0,0);
  const dd = new Date(d); dd.setHours(0,0,0,0);
  return dd > today;
}

// ─── Render ───────────────────────────────────────────────────
function renderAll() {
  renderHeader();
  renderTable();
  renderSummary();
}

function renderHeader() {
  const dates = getWeekDates(weekOffset);
  const from = dates[0], to = dates[6];
  document.getElementById('weekLabel').textContent =
    `${from.getMonth()+1}/${from.getDate()} - ${to.getMonth()+1}/${to.getDate()}`;
  document.getElementById('pageTitle').innerHTML =
    (weekOffset === 0 ? '習慣チェック' :
    weekOffset < 0 ? `${Math.abs(weekOffset)}週前` : `${weekOffset}週後`) +
    `<span class="sync-badge" id="syncBadge">● 同期済み</span>`;
}

function renderTable() {
  const dates = getWeekDates(weekOffset);
  const head = document.getElementById('tableHead');
  const body = document.getElementById('tableBody');

  head.innerHTML = '';
  const tr = document.createElement('tr');
  const th0 = document.createElement('th');
  th0.style.width = '38%';
  th0.style.textAlign = 'left';
  th0.style.paddingLeft = '12px';
  th0.textContent = '習慣確認';
  tr.appendChild(th0);
  dates.forEach((d, i) => {
    const th = document.createElement('th');
    th.textContent = DAY_LABELS[i];
    if (isToday(d)) th.className = 'today-col';
    tr.appendChild(th);
  });
  head.appendChild(tr);

  body.innerHTML = '';
  habits.forEach(habit => {
    const row = document.createElement('tr');
    row.className = 'habit-row' + (habit.important ? ' important-row' : '');

    const td0 = document.createElement('td');
    td0.className = 'habit-name';
    const streak = calcStreak(habit);
    td0.innerHTML = `
      <div class="habit-cell-wrap">
        <button onclick="toggleImportant('${habit.id}')" title="重要マーク" class="btn-star${habit.important ? ' active' : ''}">★</button>
        <div class="habit-text">
          ${escHtml(habit.name)}
          ${habit.important ? '<span class="important-badge">重要</span>' : ''}
          ${habit.freq === 'weekly' ? '<span style="font-size:.6rem;color:var(--text-muted);margin-left:4px">週1</span>' : ''}
          ${streak >= 3 ? `<span class="streak-badge">🔥${streak}</span>` : ''}
        </div>
        <div class="row-actions">
          <button onclick="moveHabit('${habit.id}',-1)" title="上へ">↑</button>
          <button onclick="moveHabit('${habit.id}',1)" title="下へ">↓</button>
          <button onclick="openEdit('${habit.id}')" title="編集">✎</button>
        </div>
      </div>`;
    row.appendChild(td0);

    dates.forEach((d, i) => {
      const td = document.createElement('td');
      td.className = 'day-cell' + (isToday(d) ? ' today-col' : '');
      const dateStr = fmt(d);
      const checked = checks[dateStr] && checks[dateStr][habit.id];
      const future = isFuture(d);

      let inner = '';
      if (habit.freq === 'weekly') {
        if (i === 6) {
          const weekChecked = isWeekChecked(habit.id, dates);
          inner = `<div class="cell-inner ${weekChecked ? 'weekly-checked' : (future ? 'future' : 'unchecked')}"
            onclick="${!future ? `toggleCheck('${habit.id}','${dateStr}')` : ''}">
            ${weekChecked ? '✓' : ''}
          </div>`;
        } else {
          td.style.opacity = '.15';
          inner = `<div class="cell-inner future"></div>`;
        }
      } else {
        inner = `<div class="cell-inner ${checked ? 'checked' : (future ? 'future' : 'unchecked')}"
          onclick="${!future ? `toggleCheck('${habit.id}','${dateStr}')` : ''}">
          ${checked ? '✓' : ''}
        </div>`;
      }
      td.innerHTML = inner;
      row.appendChild(td);
    });

    body.appendChild(row);
  });
}

function isWeekChecked(habitId, dates) {
  return dates.some(d => checks[fmt(d)] && checks[fmt(d)][habitId]);
}

function renderSummary() {
  const dates = getWeekDates(weekOffset);
  const today = new Date();
  let total = 0, done = 0;

  habits.forEach(habit => {
    if (habit.freq === 'daily') {
      dates.forEach(d => {
        if (d <= today || weekOffset < 0) {
          total++;
          if (checks[fmt(d)] && checks[fmt(d)][habit.id]) done++;
        }
      });
    } else {
      total++;
      if (isWeekChecked(habit.id, dates)) done++;
    }
  });

  const rate = total > 0 ? Math.round(done / total * 100) : 0;
  document.getElementById('sumRate').textContent = rate + '%';
  document.getElementById('sumDone').textContent = done;

  const maxStreak = habits
    .filter(h => h.freq === 'daily')
    .reduce((max, h) => Math.max(max, calcStreak(h)), 0);
  document.getElementById('sumStreak').textContent = maxStreak + '日';

  document.getElementById('progressLabel').textContent = `${done} / ${total} 完了`;
  document.getElementById('progressFill').style.width = rate + '%';
  document.getElementById('progressPct').textContent = rate + '%';
}

function calcStreak(habit) {
  if (habit.freq === 'weekly') return 0;
  let streak = 0;
  const d = new Date();
  if (!checks[fmt(d)] || !checks[fmt(d)][habit.id]) d.setDate(d.getDate() - 1);
  while (true) {
    if (checks[fmt(d)] && checks[fmt(d)][habit.id]) {
      streak++;
      d.setDate(d.getDate() - 1);
    } else break;
  }
  return streak;
}

// ─── Actions ─────────────────────────────────────────────────
function toggleCheck(habitId, dateStr) {
  if (!checks[dateStr]) checks[dateStr] = {};
  checks[dateStr][habitId] = !checks[dateStr][habitId];
  if (!checks[dateStr][habitId]) delete checks[dateStr][habitId];
  if (Object.keys(checks[dateStr]).length === 0) delete checks[dateStr];
  saveChecks();
}

function toggleImportant(id) {
  const newHabits = habits.map(h => h.id === id ? { ...h, important: !h.important } : h);
  saveHabits(newHabits);
}

function moveHabit(id, dir) {
  const idx = habits.findIndex(h => h.id === id);
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= habits.length) return;
  const newHabits = [...habits];
  [newHabits[idx], newHabits[newIdx]] = [newHabits[newIdx], newHabits[idx]];
  saveHabits(newHabits);
}

function addHabit() {
  const input = document.getElementById('newHabitInput');
  const freq = document.getElementById('newHabitFreq').value;
  const name = input.value.trim();
  if (!name) return;
  const newHabits = [...habits, { id: uid(), name, freq }];
  saveHabits(newHabits);
  input.value = '';
}

document.getElementById('newHabitInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addHabit();
});

function openEdit(id) {
  editingId = id;
  const h = habits.find(x => x.id === id);
  document.getElementById('editInput').value = h.name;
  document.getElementById('editFreq').value = h.freq;
  document.getElementById('editOverlay').classList.add('open');
}
function closeModal() {
  document.getElementById('editOverlay').classList.remove('open');
  editingId = null;
}
function saveEdit() {
  const name = document.getElementById('editInput').value.trim();
  const freq = document.getElementById('editFreq').value;
  if (!name) return;
  const newHabits = habits.map(x => x.id === editingId ? { ...x, name, freq } : x);
  saveHabits(newHabits);
  closeModal();
}
function deleteHabit() {
  if (!confirm('この習慣を削除しますか？')) return;
  const newHabits = habits.filter(x => x.id !== editingId);
  saveHabits(newHabits);
  closeModal();
}

document.getElementById('editOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('editOverlay')) closeModal();
});

function shiftWeek(delta) {
  weekOffset += delta;
  renderAll();
}

function uid() { return Math.random().toString(36).slice(2, 9); }

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Quote
const q = QUOTES[Math.floor(Math.random() * QUOTES.length)];
document.getElementById('quoteText').textContent = q.text;
document.getElementById('quoteSub').textContent = q.sub;
</script>
